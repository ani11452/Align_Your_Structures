# Environment spec for "Align Your Structures" (ICLR 2026).
#
# Reproduces the conda env used for every training and evaluation run in
# the paper. Includes PyTorch 2.6 (CUDA 12.x), RDKit, OpenMM, the OpenFF
# Toolkit (SMIRNOFF), mdtraj, PyEMMA, PyTorch Lightning, torch-geometric,
# scikit-learn-extra (for KMedoids), and related MD tooling.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate align_your_structures
#
# Tested on Linux x86_64 with CUDA 12.4.

name: align_your_structures
channels:
